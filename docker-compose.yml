name: fitness-system

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fitness}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fitness}
      POSTGRES_DB: ${POSTGRES_DB:-fitness}
      TZ: ${TZ:-Europe/Madrid}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fitness} -d ${POSTGRES_DB:-fitness}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      STORAGE_PATH: /storage
    volumes:
      - ./storage:/storage
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  web:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  db_data:
  caddy_data:
  caddy_config:
